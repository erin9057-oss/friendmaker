name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Firmware
        working-directory: ./firmware/esp32
        # 这里指定了我们之前改好的 S3 编译环境
        run: pio run -e esp32-s3-devkitc-1

      - name: Upload Bin Files
        uses: actions/upload-artifact@v4
        with:
          name: S3-Firmware-Bins
          # 提取编译好的所有 .bin 文件
          path: firmware/esp32/.pio/build/esp32-s3-devkitc-1/*.bin
