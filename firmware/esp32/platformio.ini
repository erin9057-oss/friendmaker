[platformio]
# 【修改点 1】将默认编译环境改为 esp32-s3-devkitc-1
default_envs = esp32-s3-devkitc-1

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

[env:esp32dev_wireless]
board = esp32dev
framework = arduino, espidf
build_flags =
  -DSWITCH_AUTO_DRAW_USE_CLASSIC_BT=1

# Default target for generic ESP32-WROOM-32 / ESP-32S dev boards.
# This matches the Bluetooth Classic route used for Switch controller work.

[env:nodemcu_32s_wireless]
board = nodemcu-32s
framework = arduino, espidf
build_flags =
  -DSWITCH_AUTO_DRAW_USE_CLASSIC_BT=1

# Use this if your marketplace listing or silkscreen explicitly says NodeMCU-32S.

[env:xiao_esp32c3_serial]
board = seeed_xiao_esp32c3

# Optional legacy environment for protocol-only serial testing.
# Keep this around if you still want a second board for ACK smoke tests.

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
# 【修改点 2】补充 framework 并强制开启 USB HID 模式
framework = arduino
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_HID=1
